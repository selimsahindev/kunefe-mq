syntax = "proto3";

package dev.selimsahin.kunefe;

option java_package = "dev.selimsahin.kunefe.proto";
option java_multiple_files = true;
option java_outer_classname = "KunefeCommonProto";

message KunefeMessage {
  string message_id = 1;
  string topic = 2;
  bytes payload = 3;
  map<string, string> headers = 4;
  int64 timestamp = 5;
}

message Offset {
  string topic = 1;
  int64 value = 2;
}